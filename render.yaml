services:
  - type: web
    name: quiz-slides-backend
    runtime: node
    plan: free
    buildCommand: npm install --prefix server
    startCommand: npm run start --prefix server
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: SESSION_SECRET
        generateValue: true # Render will automatically generate a secure 32-character secret
      - key: GEMINI_API_KEY
        sync: false         # You will fill this in the Render dashboard
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false         # https://your-backend.onrender.com/api/auth/google/callback
      - key: FRONTEND_URL
        sync: false         # https://your-frontend.vercel.app
